<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>P2P Game Lounge - V5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'sans-serif'; overflow: hidden; }
        .glass { background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .hidden { display: none !important; }
        #chat-window { transition: transform 0.3s ease; transform: translateY(120%); }
        #chat-window.open { transform: translateY(0); }
        .btn-game { transition: all 0.2s; border: 1px solid rgba(255,255,255,0.1); }
        .btn-game:hover { transform: translateY(-2px); border-color: #6366f1; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <div id="header-controls" class="fixed top-4 left-4 z-[100] hidden">
        <button onclick="forceEndGame()" class="bg-red-600 hover:bg-red-500 text-white px-4 py-2 rounded-full font-bold shadow-lg text-sm">🛑 強制終了</button>
    </div>

    <div class="fixed top-4 right-4 z-[100]">
        <button onclick="openSettings()" class="bg-slate-800 p-3 rounded-full border border-slate-600 shadow-lg">⚙️</button>
    </div>

    <button onclick="toggleChat()" class="fixed bottom-4 right-4 z-[110] bg-indigo-600 p-4 rounded-full shadow-2xl">💬</button>
    <div id="chat-window" class="fixed bottom-20 right-4 w-72 h-96 glass rounded-2xl z-[100] flex flex-col overflow-hidden shadow-2xl">
        <div class="p-3 bg-slate-900/50 border-b border-slate-700 font-bold flex justify-between">
            <span>ルームチャット</span>
            <button onclick="toggleChat()">✕</button>
        </div>
        <div id="chat-logs" class="flex-1 p-3 overflow-y-auto text-sm space-y-2"></div>
        <div class="p-2 bg-slate-900 flex gap-1">
            <input type="text" id="chat-input" class="flex-1 bg-slate-800 border-none rounded px-2 py-1 text-sm" placeholder="メッセージ...">
            <button onclick="sendChat()" class="bg-indigo-600 px-3 rounded text-sm">送</button>
        </div>
    </div>

    <dialog id="modal-settings" class="p-0 rounded-2xl glass text-white w-80 border-none backdrop:bg-black/60">
        <div class="p-6 space-y-4">
            <h3 class="font-bold border-b border-slate-600 pb-2">プロフィール設定</h3>
            <div>
                <label class="text-xs text-gray-400">名前</label>
                <input type="text" id="set-name" class="w-full bg-slate-900 p-2 rounded border border-slate-700">
            </div>
            <div>
                <label class="text-xs text-gray-400">アイコン (絵文字)</label>
                <input type="text" id="set-icon" class="w-full bg-slate-900 p-2 rounded border border-slate-700" placeholder="👤">
            </div>
            <button onclick="saveSettings()" class="w-full bg-indigo-600 py-2 rounded-xl font-bold">保存</button>
            <button onclick="document.getElementById('modal-settings').close()" class="w-full text-sm text-gray-400">閉じる</button>
        </div>
    </dialog>

    <div id="screen-connect" class="glass p-8 rounded-3xl w-full max-w-sm mt-10 space-y-6">
        <h1 class="text-3xl font-black text-center text-indigo-400">Game Lounge V5</h1>
        <div class="space-y-4">
            <input type="text" id="room-name-input" class="w-full p-3 rounded-xl bg-slate-900 border border-slate-700 text-center" placeholder="ルーム名 (ホストのみ)">
            <button onclick="createRoom()" class="w-full py-4 bg-emerald-600 rounded-xl font-bold">部屋を作る</button>
            <div class="relative py-2"><div class="absolute inset-0 flex items-center"><span class="w-full border-t border-slate-700"></span></div><div class="relative flex justify-center text-xs uppercase"><span class="bg-slate-800 px-2 text-gray-400">OR</span></div></div>
            <div class="flex gap-2">
                <input type="text" id="join-pin" maxlength="5" class="w-full p-3 rounded-xl bg-slate-900 border border-slate-700 text-center font-mono text-xl" placeholder="PIN">
                <button onclick="joinRoom()" class="bg-indigo-600 px-4 rounded-xl font-bold">参加</button>
            </div>
        </div>
    </div>

    <div id="screen-lobby" class="glass rounded-3xl w-full max-w-5xl h-[80vh] hidden flex flex-col md:flex-row overflow-hidden mt-6">
        <div class="w-full md:w-64 bg-slate-800/50 border-r border-slate-700 flex flex-col">
            <div class="p-4 border-b border-slate-700">
                <h2 id="display-room-name" class="font-bold text-indigo-300 truncate">Room</h2>
                <p id="display-pin" class="text-xs font-mono text-gray-500">PIN: ----</p>
            </div>
            <div id="player-list" class="flex-1 p-2 overflow-y-auto space-y-2"></div>
            <button onclick="location.reload()" class="m-4 p-2 bg-slate-700 rounded text-xs">退出する</button>
        </div>
        <div class="flex-1 p-6 overflow-y-auto">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold">ゲームを選択</h3>
                <button onclick="openOdaiSettings()" class="host-only text-xs bg-yellow-600 px-3 py-1 rounded-full font-bold">お題設定</button>
            </div>
            <div class="grid grid-cols-2 lg:grid-cols-3 gap-4 pb-20">
                <button onclick="hostStart('ten')" class="btn-game bg-slate-800 p-4 rounded-2xl flex flex-col items-center"><span class="text-3xl mb-1">🧩</span><span class="text-xs font-bold">一致テン</span></button>
                <button onclick="hostStart('drawing')" class="btn-game bg-slate-800 p-4 rounded-2xl flex flex-col items-center"><span class="text-3xl mb-1">🎨</span><span class="text-xs font-bold">お絵かき</span></button>
                <button onclick="hostStart('ww')" class="btn-game bg-slate-800 p-4 rounded-2xl flex flex-col items-center"><span class="text-3xl mb-1">🐺</span><span class="text-xs font-bold">人狼</span></button>
                <button onclick="hostStart('bomb')" class="btn-game bg-slate-800 p-4 rounded-2xl flex flex-col items-center"><span class="text-3xl mb-1">💣</span><span class="text-xs font-bold">爆弾ポテト</span></button>
                <button onclick="hostStart('quiz')" class="btn-game bg-slate-800 p-4 rounded-2xl flex flex-col items-center"><span class="text-3xl mb-1">❓</span><span class="text-xs font-bold">クイズ</span></button>
                <button onclick="hostStart('vote')" class="btn-game bg-slate-800 p-4 rounded-2xl flex flex-col items-center"><span class="text-3xl mb-1">⚖️</span><span class="text-xs font-bold">多数決</span></button>
                <button onclick="hostStart('code')" class="btn-game bg-slate-800 p-4 rounded-2xl flex flex-col items-center"><span class="text-3xl mb-1">📟</span><span class="text-xs font-bold">暗号解読</span></button>
                <button onclick="hostStart('typing')" class="btn-game bg-slate-800 p-4 rounded-2xl flex flex-col items-center"><span class="text-3xl mb-1">⌨️</span><span class="text-xs font-bold">タイピング</span></button>
                <button onclick="hostStart('tap')" class="btn-game bg-slate-800 p-4 rounded-2xl flex flex-col items-center"><span class="text-3xl mb-1">🚀</span><span class="text-xs font-bold">タップラッシュ</span></button>
            </div>
        </div>
    </div>

    <div id="game-container" class="glass rounded-3xl w-full max-w-4xl h-[80vh] hidden flex flex-col p-6 mt-6 relative overflow-y-auto">
        <div id="game-content" class="flex-1 flex flex-col items-center justify-center text-center space-y-6"></div>
        <div id="host-game-controls" class="host-only hidden mt-4 flex gap-2 justify-center">
            <button onclick="hostStart(currentGame)" class="bg-emerald-600 px-6 py-2 rounded-full font-bold">もう一度</button>
            <button onclick="backToLobby()" class="bg-slate-700 px-6 py-2 rounded-full font-bold">ロビーへ</button>
        </div>
    </div>

    <script>
        const APP_P = 'gl-v5-';
        let peer, conn, connections = [], isHost = false, myId;
        let players = [], currentGame = null;
        let userData = JSON.parse(localStorage.getItem('gl_user') || '{"name":"ゲスト","icon":"👤"}');
        let odaiData = { ten: "猫,りんご,富士山", draw: "車,メガネ,時計" };
        let roomName = "Game Lounge";

        // --- 初期化 ---
        function openSettings() { document.getElementById('set-name').value = userData.name; document.getElementById('set-icon').value = userData.icon; document.getElementById('modal-settings').showModal(); }
        function saveSettings() { userData.name = document.getElementById('set-name').value || "ゲスト"; userData.icon = document.getElementById('set-icon').value || "👤"; localStorage.setItem('gl_user', JSON.stringify(userData)); document.getElementById('modal-settings').close(); updatePlayerInfo(); }
        function updatePlayerInfo() { if(isHost) { let p = players.find(x=>x.id===myId); if(p){p.name=userData.name; p.icon=userData.icon;} broadcast({type:'SYNC_PLAYERS', players}); renderPlayers(); } else if(conn) { conn.send({type:'UPDATE_PROFILE', name:userData.name, icon:userData.icon}); } }

        function toggleChat() { document.getElementById('chat-window').classList.toggle('open'); }
        function sendChat() { const input = document.getElementById('chat-input'); if(!input.value) return; const msg = {type:'CHAT', sender:userData.name, text:input.value}; if(isHost) { handleChat(msg); broadcast(msg); } else { conn.send(msg); } input.value=''; }
        function handleChat(d) { const log = document.getElementById('chat-logs'); log.innerHTML += `<div><span class="font-bold text-indigo-400">${d.sender}:</span> ${d.text}</div>`; log.scrollTop = log.scrollHeight; }

        function showScreen(id) { 
            document.querySelectorAll('body > div[id^="screen-"], #game-container').forEach(e=>e.classList.add('hidden')); 
            document.getElementById(id).classList.remove('hidden'); 
            if(id==='game-container') document.getElementById('header-controls').classList.remove('hidden');
            else document.getElementById('header-controls').classList.add('hidden');
        }

        // --- P2P ---
        function createRoom() {
            roomName = document.getElementById('room-name-input').value || "Game Lounge";
            const pin = Math.floor(10000+Math.random()*90000).toString();
            peer = new Peer(APP_P + pin);
            peer.on('open', (id)=>{
                isHost=true; myId=id; players=[{id, name:userData.name, icon:userData.icon, host:true}];
                document.getElementById('display-pin').innerText = "PIN: " + pin;
                document.getElementById('display-room-name').innerText = roomName;
                renderPlayers(); showScreen('screen-lobby');
            });
            peer.on('connection', c => {
                c.on('data', d => {
                    if(d.type==='JOIN') { players.push({id:c.peer, name:d.name, icon:d.icon}); broadcast({type:'SYNC_PLAYERS', players, roomName}); renderPlayers(); }
                    if(d.type==='UPDATE_PROFILE') { let p=players.find(x=>x.id===c.peer); if(p){p.name=d.name; p.icon=d.icon;} broadcast({type:'SYNC_PLAYERS', players}); renderPlayers(); }
                    if(d.type==='CHAT') { handleChat(d); broadcast(d); }
                    handleGameData(c.peer, d);
                });
                connections.push(c);
            });
        }

        function joinRoom() {
            const pin = document.getElementById('join-pin').value;
            peer = new Peer();
            peer.on('open', (id)=>{
                myId = id; conn = peer.connect(APP_P + pin);
                conn.on('open', ()=> conn.send({type:'JOIN', name:userData.name, icon:userData.icon}));
                conn.on('data', d => {
                    if(d.type==='SYNC_PLAYERS') { players=d.players; roomName=d.roomName||roomName; document.getElementById('display-room-name').innerText=roomName; renderPlayers(); showScreen('screen-lobby'); }
                    if(d.type==='CHAT') handleChat(d);
                    if(d.type==='GAME_START') clientStart(d);
                    if(d.type==='GAME_DATA') handleClientGameData(d);
                    if(d.type==='FORCE_END') location.reload();
                });
            });
        }

        function broadcast(d) { connections.forEach(c=> c.open && c.send(d)); }
        function renderPlayers() {
            const list = document.getElementById('player-list'); list.innerHTML = '';
            players.forEach(p => {
                list.innerHTML += `<div class="flex items-center gap-2 p-2 bg-slate-900/50 rounded-xl border border-slate-700">
                    <span class="text-xl">${p.icon}</span>
                    <span class="flex-1 truncate text-sm font-bold">${p.name}</span>
                </div>`;
            });
            document.querySelectorAll('.host-only').forEach(e=> isHost?e.classList.remove('hidden'):e.classList.add('hidden'));
        }

        // --- ゲーム管理 ---
        function hostStart(game) {
            if(!isHost) return;
            if((game==='ten'||game==='drawing') && !confirm("お題は設定しましたか？")) return;
            currentGame = game;
            let data = { type: 'GAME_START', game };
            // 初期化用データ生成
            if(game==='ten') data.odai = odaiData.ten.split(',').sort(()=>0.5-Math.random())[0];
            if(game==='drawing') { 
                data.drawer = players[Math.floor(Math.random()*players.length)].id;
                data.odai = odaiData.draw.split(',').sort(()=>0.5-Math.random())[0];
            }
            if(game==='ww') {
                data.roles = {}; let r=['wolf','seer']; while(r.length<players.length) r.push('villager');
                r.sort(()=>0.5-Math.random()); players.forEach((p,i)=>data.roles[p.id]=r[i]);
            }
            if(game==='code') data.target = Math.floor(Math.random()*100);
            if(game==='typing') data.word = "JavaScript P2P Gaming Lounge V5";
            
            broadcast(data);
            clientStart(data);
        }

        function clientStart(d) {
            currentGame = d.game;
            showScreen('game-container');
            const cont = document.getElementById('game-content');
            cont.innerHTML = '';
            document.getElementById('host-game-controls').classList.add('hidden');
            
            if(d.game==='ten') {
                cont.innerHTML = `<h2 class="text-2xl font-bold text-emerald-400">一致するまで終われまテン</h2>
                    <div class="text-4xl font-black py-8">『${d.odai}』</div>
                    <input type="text" id="g-input" class="w-full max-w-xs p-4 bg-slate-900 rounded-xl text-center text-xl" placeholder="回答を入力...">
                    <button onclick="submitAns('TEN_SUB')" id="g-btn" class="bg-indigo-600 px-8 py-3 rounded-full font-bold">提出</button>
                    <div id="g-status" class="mt-4 text-sm text-gray-400">提出状況: 0 / ${players.length}</div>`;
            }
            
            if(d.game==='ww') {
                const myRole = d.roles[myId];
                cont.innerHTML = `<h2 class="text-2xl font-bold text-red-500">役職確認 (残り10秒)</h2>
                    <div class="text-5xl font-black py-6">${myRole==='wolf'?'🐺 人狼':(myRole==='seer'?'🔮 占い師':'🧑‍🌾 市民')}</div>
                    <div id="ww-action" class="space-y-4">
                        <p class="text-sm">${myRole==='wolf'?'襲撃する人':(myRole==='seer'?'占う人':'...')}</p>
                        <div id="ww-targets" class="grid grid-cols-2 gap-2"></div>
                    </div>`;
                const tList = document.getElementById('ww-targets');
                players.forEach(p => {
                    if(p.id !== myId) tList.innerHTML += `<button onclick="submitAns('WW_ACT', '${p.id}')" class="bg-slate-800 p-2 rounded">${p.name}</button>`;
                });
                if(myRole==='villager') document.getElementById('ww-action').innerHTML = "夜が明けるのを待っています...";
                // 10秒タイマー
                setTimeout(()=>{ if(isHost) checkWW(); }, 10000);
            }

            if(d.game==='drawing') {
                const isDrawer = d.drawer === myId;
                cont.innerHTML = `<div class="w-full flex justify-between text-xs mb-2"><span>${isDrawer?'あなたが描く番です':'何を描いている？'}</span><span>お題: ${isDrawer?d.odai:'???'}</span></div>
                    <canvas id="d-canvas" width="300" height="300" class="bg-white rounded-xl touch-none"></canvas>
                    ${isDrawer?'':`<div class="flex gap-2 w-full max-w-xs mt-2"><input id="g-input" class="flex-1 bg-slate-900 p-2 rounded"><button onclick="submitAns('DRAW_GUESS')" class="bg-indigo-600 px-4 rounded">答</button></div>`}`;
                initCanvas(isDrawer);
            }

            if(d.game==='typing') {
                cont.innerHTML = `<h2 class="text-xl font-bold">タイピング・レース</h2>
                    <div class="bg-slate-900 p-6 rounded-2xl text-xl font-mono my-4" id="target-word">${d.word}</div>
                    <input type="text" id="g-input" class="w-full max-w-xs p-3 bg-slate-800 rounded text-center" oninput="checkTyping(this, '${d.word}')">`;
            }

            if(d.game==='tap') {
                cont.innerHTML = `<h2 class="text-xl font-bold">10秒タップラッシュ！</h2>
                    <div id="tap-count" class="text-7xl font-black my-8">0</div>
                    <button onclick="tapCount()" id="tap-btn" class="w-40 h-40 bg-red-600 rounded-full text-2xl font-bold shadow-2xl border-8 border-red-800">TAP!!</button>`;
                let count = 0;
                window.tapCount = () => { count++; document.getElementById('tap-count').innerText = count; };
                setTimeout(()=> { 
                    document.getElementById('tap-btn').disabled = true;
                    submitAns('TAP_RES', count);
                }, 10000);
            }

            if(d.game==='vote') {
                cont.innerHTML = `<h2 class="text-xl font-bold">多数決サバイバル</h2>
                    <p class="py-4">好きなほうを選べ！多数派が生き残る！</p>
                    <div class="flex gap-4">
                        <button onclick="submitAns('VOTE', 'A')" class="flex-1 bg-blue-600 p-8 rounded-2xl font-bold text-2xl">きのこ</button>
                        <button onclick="submitAns('VOTE', 'B')" class="flex-1 bg-red-600 p-8 rounded-2xl font-bold text-2xl">たけのこ</button>
                    </div>`;
            }

            if(d.game==='code') {
                cont.innerHTML = `<h2 class="text-xl font-bold">暗号解読 (0-99)</h2>
                    <p class="text-sm text-gray-400 py-2">数字を当てろ！ヒントが出るぞ</p>
                    <input type="number" id="g-input" class="w-24 p-4 bg-slate-900 rounded text-center text-2xl">
                    <button onclick="submitAns('CODE_GUESS')" class="bg-indigo-600 px-8 py-2 rounded-full mt-4">予想</button>
                    <div id="code-hint" class="mt-4 font-bold text-yellow-400"></div>`;
            }
            
            if(d.game==='quiz') {
                cont.innerHTML = `<h2 class="text-xl font-bold">クイック・クイズ</h2>
                    <div class="host-only hidden py-4">
                        <input id="q-odai" class="bg-slate-900 p-2 rounded w-full mb-2" placeholder="問題文を入力...">
                        <button onclick="sendQuiz()" class="bg-emerald-600 w-full py-2 rounded">問題送信</button>
                    </div>
                    <div id="quiz-area" class="py-8 font-bold text-xl">ホストの出題を待っています...</div>
                    <div id="quiz-input-area" class="hidden flex gap-2">
                        <input id="g-input" class="bg-slate-900 p-2 rounded">
                        <button onclick="submitAns('QUIZ_ANS')" class="bg-indigo-600 px-4 rounded">答</button>
                    </div>`;
                window.sendQuiz = () => { broadcast({type:'GAME_DATA', sub:'QUIZ_Q', q: document.getElementById('q-odai').value}); };
            }
        }

        // --- ゲーム内アクション ---
        let gameResults = {};
        function submitAns(type, val = null) {
            const v = val || document.getElementById('g-input')?.value;
            if(!v && v !== 0) return;
            if(document.getElementById('g-btn')) document.getElementById('g-btn').disabled = true;
            if(isHost) handleGameData(myId, {type: 'GAME_DATA', sub: type, val: v});
            else conn.send({type: 'GAME_DATA', sub: type, val: v});
        }

        function handleGameData(pid, d) {
            if(!isHost) return;
            if(d.sub === 'TEN_SUB') {
                gameResults[pid] = d.val;
                updateStatus(`提出状況: ${Object.keys(gameResults).length} / ${players.length}`);
                if(Object.keys(gameResults).length === players.length) {
                    let res = Object.values(gameResults);
                    let allMatch = res.every(v => normalize(v) === normalize(res[0]));
                    broadcast({type:'GAME_DATA', sub:'RES', text: allMatch ? "🎉 全員一致成功！" : "❌ 不一致..."});
                }
            }
            if(d.sub === 'WW_ACT') {
                gameResults[pid] = d.val;
                if(Object.keys(gameResults).length >= players.filter(p=>p.role!=='villager').length) checkWW();
            }
            if(d.sub === 'DRAW_GUESS') {
                const odai = document.getElementById('d-odai')?.innerText; // ホスト側で保持
                if(normalize(d.val) === normalize(currentOdai)) {
                    broadcast({type:'GAME_DATA', sub:'RES', text: `${players.find(x=>x.id===pid).name} が正解！<br>正解は「${currentOdai}」でした！`});
                }
            }
            if(d.sub === 'TAP_RES' || d.sub === 'VOTE' || d.sub === 'QUIZ_ANS') {
                gameResults[pid] = d.val;
                if(Object.keys(gameResults).length === players.length) {
                    // ここで集計して結果を返す（簡易化のためログ出力や終了処理）
                    broadcast({type:'GAME_DATA', sub:'RES', text: "全員の提出が完了しました！"});
                }
            }
            if(d.sub === 'CODE_GUESS') {
                if(parseInt(d.val) === targetCode) {
                    broadcast({type:'GAME_DATA', sub:'RES', text: `${players.find(x=>x.id===pid).name} が解読成功！<br>正解は「${targetCode}」でした！`});
                } else {
                    const hint = parseInt(d.val) < targetCode ? "もっと大きい" : "もっと小さい";
                    const targetConn = connections.find(c=>c.peer === pid);
                    if(targetConn) targetConn.send({type:'GAME_DATA', sub:'HINT', hint});
                    else if(pid===myId) document.getElementById('code-hint').innerText = hint;
                }
            }
        }

        function handleClientGameData(d) {
            if(d.sub === 'RES') {
                document.getElementById('game-content').innerHTML = `<div class="text-3xl font-black">${d.text}</div>`;
                document.getElementById('host-game-controls').classList.remove('hidden');
            }
            if(d.sub === 'HINT') document.getElementById('code-hint').innerText = d.hint;
            if(d.sub === 'QUIZ_Q') {
                document.getElementById('quiz-area').innerText = d.q;
                document.getElementById('quiz-input-area').classList.remove('hidden');
            }
        }

        // --- 便利機能 ---
        function normalize(s) { return s.normalize('NFKC').replace(/[\u30a1-\u30f6]/g, m => String.fromCharCode(m.charCodeAt(0) - 0x60)).toLowerCase().trim(); }
        
        function forceEndGame() { if(isHost) { broadcast({type:'FORCE_END'}); location.reload(); } }
        function backToLobby() { showScreen('screen-lobby'); broadcast({type:'GAME_END'}); }
        function updateStatus(txt) { broadcast({type:'GAME_DATA', sub:'STATUS', txt}); document.getElementById('g-status').innerText = txt; }

        // お絵かきキャンバス初期化
        function initCanvas(canDraw) {
            const cvs = document.getElementById('d-canvas');
            const ctx = cvs.getContext('2d');
            let drawing = false;
            cvs.onmousedown = (e) => { if(!canDraw) return; drawing=true; ctx.beginPath(); };
            cvs.onmousemove = (e) => {
                if(!drawing) return;
                const rect = cvs.getBoundingClientRect();
                ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top);
                ctx.stroke();
            };
            cvs.onmouseup = () => drawing=false;
        }

        // お題設定
        function openOdaiSettings() {
            const val = prompt("テンお題 (カンマ区切り)", odaiData.ten);
            if(val) odaiData.ten = val;
            const val2 = prompt("お絵かきお題 (カンマ区切り)", odaiData.draw);
            if(val2) odaiData.draw = val2;
        }
    </script>
</body>
